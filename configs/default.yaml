app:
  window_title: "Interactive Face Particle Visualization"
  window_width: 1280
  window_height: 720
  target_fps: 60
  debug_mode: true

camera:
  device_id: 0
  width: 640
  height: 480
  fps: 30

tracker:
  max_faces: 1
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5
  smoothing_factor: 0.5
  max_hands: 2

particles:
  count: 50000
  base_size: 1.5
  attraction_speed: 40.0
  friction: 0.85

post_process:
  bloom_iterations: 3
  bloom_intensity: 1.5
  blur_radius: 2.0
